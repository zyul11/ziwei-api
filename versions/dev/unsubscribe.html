<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取消订阅 — 紫微斗数每日运势</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a14;color:#d0c8e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:480px;width:100%;padding:20px}
.card{background:linear-gradient(135deg,#12101e,#1a1030);border:1px solid #2a1a4a;border-radius:16px;padding:40px 32px;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
h1{color:#d0c8e0;font-size:20px;margin-bottom:8px}
p{color:#8a7a9a;font-size:13px;line-height:1.7;margin-bottom:24px}
.btn{display:inline-block;padding:12px 32px;border:none;border-radius:10px;background:linear-gradient(135deg,#e04040,#b02020);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(224,64,64,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.success{display:none;padding:20px;background:#0d2a1a;border:1px solid #1a4a2a;border-radius:12px;margin-top:16px}
.success .check{font-size:36px;margin-bottom:8px}
.success h2{color:#4ade80;font-size:16px;margin-bottom:4px}
.success p{color:#8a9a7a;font-size:12px;margin-bottom:0}
.footer{text-align:center;padding:20px;color:#4a3a5a;font-size:11px}
.footer a{color:#6a5a8a;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="icon">📧</div>
    <h1>取消每日运势订阅</h1>
    <p>取消后你将不再收到每日运势邮件。<br>已购买的订阅服务不会退还，可继续在网页端查看。</p>
    <form id="unsubForm" onsubmit="return doUnsub(event)">
      <input type="email" id="email" placeholder="输入你的邮箱地址" required
        style="width:100%;padding:12px 14px;background:#1a1030;border:1px solid #2a1a4a;border-radius:8px;color:#d0c8e0;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;box-sizing:border-box">
      <button type="submit" class="btn" id="submitBtn">确认取消订阅</button>
    </form>
    <div class="success" id="successMsg">
      <div class="check">✅</div>
      <h2>已取消订阅</h2>
      <p>你已成功取消每日运势邮件推送。如需恢复，可随时重新注册。</p>
    </div>
  </div>
  <div class="footer">
    <a href="/">返回首页</a>
  </div>
</div>

<script>
const API = window.location.origin;

async function doUnsub(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  try {
    const res = await fetch(API + '/v1/unsubscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const d = await res.json();
    document.getElementById('unsubForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '确认取消订阅';
    alert('操作失败，请稍后重试');
  }
  return false;
}
</script>
</body>
</html>
